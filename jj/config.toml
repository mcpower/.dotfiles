#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "mcpower"
email = "mcpower@users.noreply.github.com"

[ui]
default-command = ["log"]
merge-editor = "vscode"

[colors]
"diff token" = { underline = false }
"diff removed token" = { bg = "#221111" }
"diff added token" = { bg = "#002200" }

[aliases]
amend = ["squash", "--keep-emptied"]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]

l = ["log", "-r", "ancestors(reachable(@, mutable()), 2)"]

long = ["log", "--no-graph", "-T", "builtin_log_detailed"]
git-log = ["long", "-r", "::@"]

abandon- = ["abandon", "-r", "@-"]
desc- = ["desc", "-r", "@-"]
diff- = ["diff", "-r", "@-"]
diffedit- = ["diffedit", "-r", "@-"]
edit- = ["prev", "--edit"]
new- = ["new", "-r", "@-"]
show- = ["show", "-r", "@-"]
split- = ["split", "-r", "@-"]

[templates]
log = 'my_log'

[template-aliases]
'format_short_change_id(id)' = 'id.shortest(4)'

'my_log' = 'my_log(self)'
'my_log(commit)' = '''
if(commit.root(),
  format_root_commit(commit),
  label(
    separate(" ",
      if(commit.current_working_copy(), "working_copy"),
      if(commit.immutable(), "immutable", "mutable"),
      if(commit.conflict(), "conflicted"),
    ),
    separate(" ",
      format_short_change_id_with_change_offset(commit),

      commit.bookmarks(),
      commit.tags(),
      commit.working_copies(),

      if(commit.description(),
        commit.description().first_line(),
        label(if(commit.empty(), "empty"), description_placeholder),
      ),
      if(commit.empty(), empty_commit_marker),

      if(!commit.mine(), format_short_signature_oneline(commit.author())),
      commit_timestamp(commit).ago(),

      format_commit_labels(commit),
      if(config("ui.show-cryptographic-signatures").as_boolean(),
        format_short_cryptographic_signature(commit.signature())
      ),

      format_short_commit_id(commit.commit_id()),
    ) ++ "\n"
  )
)
'''
